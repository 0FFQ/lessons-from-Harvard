<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Валюта</title>
    <script>
      // Валюта - currency, Курс - rate
      document.addEventListener("DOMContentLoaded", function () {
        document.querySelector("form").onsubmit = function () {
          fetch("https://api.frankfurter.dev/v1/latest?base=USD")
            .then((response) => response.json())
            .then((data) => {
              const currency = document.querySelector("#currency").value.toUpperCase();
              const rate = data.rates[currency];
              if (rate !== undefined) {
                document.querySelector("#result").innerHTML =
                  `1 Доллар равен ${rate.toFixed(3)} ${currency}.`;
              } else {
                document.querySelector('#result').innerHTML = 'Валюта не найдета, попродуй снова'
              }
            })
            .catch(error => {
                console.log('Ошибка', error);
            })
            ;

          return false;
        };
      });
    </script>
  </head>
  <body>
    <form>
      <input id="currency" placeholder="Введи валюту" type="text" />
      <input type="submit" value="Конвертировать" />
    </form>
    <div id="result"></div>
  </body>
</html>
